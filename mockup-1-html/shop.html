<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The little shop — Victoriashire</title>
  <meta name="description" content="Book a one-month trial or grab a school tee, tote or crayon set. Course trials from RM 100. Checkout is a demo — no card is charged.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesque:wght@500;600;700;800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-header"></div>

  <main id="main">
    <section class="page-hero">
      <div class="container container-narrow">
        <p class="eyebrow">Uniform, supplies &amp; course trials</p>
        <h1 class="h-hero">The school shop.</h1>
        <p class="sec-lede">Everyday essentials for term and one-month course trials. Checkout is a demo — no card is charged.</p>
      </div>
    </section>

    <section class="section container">
      <div class="filter-pills" role="group" aria-label="Filter products">
        <button class="filter-pill" type="button" data-filter="all" aria-pressed="true">All</button>
        <button class="filter-pill" type="button" data-filter="course" aria-pressed="false">Course trials</button>
        <button class="filter-pill" type="button" data-filter="goodie" aria-pressed="false">Goodies</button>
      </div>
      <div class="shop-grid" id="shop-grid"></div>
    </section>
  </main>

  <div id="site-footer"></div>
  <div id="cart-drawer-mount"></div>

  <script src="vendor/gsap.min.js"></script>
  <script src="vendor/ScrollTrigger.min.js"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/shop.js"></script>
</body>
</html>
